<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GradeView – See the grades before you pick the class</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f14;
      color: #e0e0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }
    .logo { font-size: 48px; font-weight: 800; letter-spacing: -2px; color: #fff; }
    .logo span { color: #6c8fff; }
    .tagline { font-size: 20px; color: #888; margin-top: 12px; margin-bottom: 40px; }
    .badge img { height: 52px; }
    .footer { margin-top: 60px; font-size: 13px; color: #444; }
    .footer a { color: #555; text-decoration: none; }
    .footer a:hover { color: #888; }
  </style>
</head>
<body>
  <div class="logo">Grade<span>View</span></div>
  <p class="tagline">See the grades before you pick the class.</p>
  <div class="badge">
    <a href="#">
      <img src="https://developer.apple.com/app-store/marketing/guidelines/images/badge-download-on-the-app-store.svg" alt="Download on the App Store" />
    </a>
  </div>
  <div class="footer">
    <a href="/privacy.html">Privacy Policy</a>
  </div>
</body>
</html>
